name: Repax Front CI/CD IIS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build 

      - name: Prepare deploy folder
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force deploy -ErrorAction SilentlyContinue
          New-Item -ItemType Directory deploy
          if (Test-Path dist) {
            Copy-Item dist\* deploy -Recurse
          } else {
            Copy-Item build\* deploy -Recurse
          }

      - name: Deploy to PRD
        uses: jahbenjah/SmarterASP.NET-web-deploy@1.0.0.alpha.8
        with:
          website-name: fernandogouvea-002-site4
          server-computer-name: https://win1017.site4now.net:8172
          server-username: fernandogouvea-002
          server-password: Tx7807801313
          source-path: deploy